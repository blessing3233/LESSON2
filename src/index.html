<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body{
            background-color: rgb(16, 160, 28);
        }
        label{
            color: brown;
            font-size: 30px;
            font-weight: 700;
        }
        
    </style>
</head>
<body>
 <form>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name"><br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email"><br><br>
    <label for="phone">Phone:</label>
    <input type="tel" id="phone" name="phone"><br><br>
    <label for="age">Gender:</label>
    <input type="radio" id="male" name="sex" value="male">
    <label for="male">Male</label>
    <input type="radio" id="female" name="sex" value="female">
    <label for="female">Female</label>
    <input type="radio" id="others" name="sex" value="others">
    <label for="others">Others</label><br><br>
    <label for="message">Message:</label><br>
    <textarea id="message" name="message" rows="4" cols="50" placeholder="tell us something about us"></textarea><br><br>
    <label for="fluent_language">Fluent Language:</label><br>
    <label for="english">English</label>
    <input type="radio" id="english" name="fluent_language" value="english"><br>
    <label for="spanish">Spanish</label>    
    <input type="radio" id="spanish" name="fluent_language" value="spanish"><br>
    <label for="french">French</label>    
    <input type="radio" id="french" name="fluent_language" value="french"><br><br>   
    <input type="submit" value="Submit">
 </form>
 <p style="background-color: rgb(230, 173, 182);">i love you </p>
  <div>
    <img src="" alt="">
    <p>this is a image</p>
    <button>click me</button>
  </div>
  
</body>
</html>
